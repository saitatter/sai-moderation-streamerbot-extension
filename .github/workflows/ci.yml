name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore sai-moderation-streamerbot-extension.slnx

      - name: Build
        run: dotnet build sai-moderation-streamerbot-extension.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test sai-moderation-streamerbot-extension.slnx --no-build --configuration Release

